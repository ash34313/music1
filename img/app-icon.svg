<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for space gradients and glowing effects -->
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.25"/> <!-- Deep Slate Blue -->
      <stop offset="60%" stop-color="#0f172a"/> <!-- Slate 900 -->
      <stop offset="100%" stop-color="#020617"/> <!-- Slate 950 -->
    </radialGradient>

    <!-- Neon Mint Glow Effect -->
    <filter id="mintGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Headphone Stroke Gradient -->
    <linearGradient id="mintTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/> <!-- Mint Green -->
      <stop offset="50%" stop-color="#14b8a6"/> <!-- Teal -->
      <stop offset="100%" stop-color="#38bdf8"/> <!-- Cosmic Sky Blue -->
    </linearGradient>
  </defs>

  <!-- Smooth rounded base matching iOS icon constraints -->
  <rect width="512" height="512" rx="118" fill="url(#bgGradient)"/>
  
  <!-- Subtle Outer Border Frame -->
  <rect x="2" y="2" width="508" height="508" rx="116" fill="none" stroke="#10b981" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Background Ambient Star Fields -->
  <g fill="#a7f3d0" opacity="0.3">
    <circle cx="120" cy="140" r="3" />
    <circle cx="400" cy="110" r="2" />
    <circle cx="380" cy="380" r="3.5" />
    <circle cx="140" cy="360" r="1.5" />
    <circle cx="256" cy="70" r="2.5" />
  </g>

  <!-- Central Pair of Headphone Geometry with Mint Neon Glow -->
  <g filter="url(#mintGlow)" fill="none">
    <!-- The Headband Arc -->
    <path d="M 140,270 A 116,116 0 0,1 372,270" stroke="url(#mintTeal)" stroke-width="28" stroke-linecap="round" />
    
    <!-- Outer Metal Arm Extenders -->
    <path d="M 140,265 L 140,300" stroke="url(#mintTeal)" stroke-width="20" stroke-linecap="round" />
    <path d="M 372,265 L 372,300" stroke="url(#mintTeal)" stroke-width="20" stroke-linecap="round" />

    <!-- Left Ear Cup (Capsule Shape) -->
    <rect x="110" y="280" width="56" height="100" rx="28" fill="#020617" stroke="url(#mintTeal)" stroke-width="20" />
    <!-- Left Inner Cushion Detail -->
    <rect x="124" y="300" width="14" height="60" rx="7" fill="url(#mintTeal)" opacity="0.4" />

    <!-- Right Ear Cup (Capsule Shape) -->
    <rect x="346" y="280" width="56" height="100" rx="28" fill="#020617" stroke="url(#mintTeal)" stroke-width="20" />
    <!-- Right Inner Cushion Detail -->
    <rect x="374" y="300" width="14" height="60" rx="7" fill="url(#mintTeal)" opacity="0.4" />
    
    <!-- Delicate Internal Wiring Line Detail (Subtle background accent) -->
    <path d="M 166,330 Q 256,380 346,330" stroke="#14b8a6" stroke-width="4" stroke-dasharray="6,6" opacity="0.5" />
  </g>

  <!-- Sound Node Pulsing Dot in Center Blank Space -->
  <circle cx="256" cy="325" r="8" fill="#a7f3d0" filter="url(#mintGlow)" opacity="0.8"/>
</svg>
